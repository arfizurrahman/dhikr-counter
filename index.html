<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dhikr Counter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f7f3;
      --surface: #ffffff;
      --surface2: #f2efe8;
      --border: rgba(0,0,0,0.10);
      --border2: rgba(0,0,0,0.18);
      --text: #1a1a18;
      --text2: #6b6b65;
      --green: #1D9E75;
      --green-dark: #0F6E56;
      --green-deep: #085041;
      --green-light: #E1F5EE;
      --red: #A32D2D;
      --radius: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111210;
        --surface: #1c1d1a;
        --surface2: #252623;
        --border: rgba(255,255,255,0.09);
        --border2: rgba(255,255,255,0.16);
        --text: #f0ede6;
        --text2: #888880;
        --green-light: #04342C;
      }
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body {
      padding: 2rem 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem 2.5rem;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-title {
      font-family: 'Amiri', serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      margin-bottom: 4px;
    }

    .app-sub {
      font-size: 13px;
      color: var(--text2);
      text-align: center;
      margin-bottom: 1rem;
    }

    .selector-wrap {
      width: 100%;
      margin-bottom: 1.3rem;
    }

    .selector-label {
      display: block;
      font-size: 11px;
      color: var(--text2);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 6px;
      text-align: left;
    }

    .dhikr-select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
    }

    .ring {
      width: 190px;
      height: 190px;
      border-radius: 50%;
      border: 2px solid var(--border2);
      background: var(--surface2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.8rem;
      transition: border-color 0.3s, background 0.3s;
      position: relative;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
    }

    .ring.listening {
      border-color: var(--green);
      border-width: 3px;
      background: var(--green-light);
    }

    .ring.pulse {
      animation: pulse 0.45s ease-out;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.07); }
      100% { transform: scale(1); }
    }

    .count-num {
      font-family: 'Amiri', serif;
      font-size: 80px;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
    }

    .count-label {
      font-size: 12px;
      color: var(--text2);
      margin-top: 4px;
      letter-spacing: 0.05em;
      text-transform: lowercase;
    }

    .arabic {
      font-family: 'Amiri', serif;
      font-size: 24px;
      color: var(--text2);
      direction: rtl;
      margin-bottom: 1.4rem;
      text-align: center;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 1.8rem;
      min-height: 22px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border2);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .dot.active {
      background: var(--green);
      animation: blink 1.2s infinite;
    }

    .dot.detected {
      background: var(--green-deep);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    .btn-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .btn {
      flex: 1;
      padding: 11px 0;
      border-radius: var(--radius);
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:hover { background: var(--surface2); }
    .btn:active { transform: scale(0.97); }

    .btn.primary {
      border-color: var(--green);
      color: var(--green-dark);
      font-weight: 500;
    }

    .btn.primary.on {
      background: var(--green);
      color: #fff;
    }

    .error-msg {
      font-size: 12px;
      color: var(--red);
      text-align: center;
      margin-top: 14px;
      line-height: 1.5;
    }

    .history {
      margin-top: 2rem;
      width: 100%;
      border-top: 1px solid var(--border);
      padding-top: 1.2rem;
    }

    .history-title {
      font-size: 11px;
      color: var(--text2);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .accordion {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .accordion-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface2);
      overflow: hidden;
    }

    .accordion-summary {
      list-style: none;
      cursor: pointer;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text);
      font-size: 13px;
      user-select: none;
    }

    .accordion-summary::-webkit-details-marker { display: none; }

    .accordion-title {
      font-weight: 500;
    }

    .accordion-total {
      color: var(--green-dark);
      font-weight: 600;
    }

    .accordion-content {
      border-top: 1px solid var(--border);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sessions { display: flex; flex-direction: column; gap: 6px; }

    .session-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      padding: 7px 12px;
      background: var(--surface2);
      border-radius: 8px;
      color: var(--text2);
    }

    .session-count {
      font-weight: 500;
      color: var(--green-dark);
    }

    .footer {
      margin-top: 2.5rem;
      font-size: 11px;
      color: var(--text2);
      text-align: center;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="app-title">Dhikr Counter</div>
    <div class="app-sub">Choose a dhikr, say it, or tap the circle</div>

    <div class="selector-wrap">
      <label class="selector-label" for="dhikrSelect">Dhikr</label>
      <select id="dhikrSelect" class="dhikr-select">
        <option value="astaghfirullah">Astaghfirullah</option>
        <option value="subhanallah">Subhanallah</option>
        <option value="alhamdulillah">Alhamdulillah</option>
        <option value="allahuakbar">Allahu Akbar</option>
        <option value="lailahaillallah">La ilaha illallah</option>
      </select>
    </div>

    <div class="ring" id="ring" role="button" tabindex="0" aria-label="Tap to count once">
      <div class="count-num" id="countNum">0</div>
      <div class="count-label">times</div>
    </div>

    <div class="arabic" id="arabicText">أَسْتَغْفِرُ اللَّهَ</div>

    <div class="status-row">
      <div class="dot" id="dot"></div>
      <span id="statusText">Press "Start" to begin</span>
    </div>

    <div class="btn-row">
      <button class="btn primary" id="startBtn" onclick="toggleListen()">Start listening</button>
      <button class="btn" onclick="resetCount()">Reset</button>
    </div>

    <div id="errorMsg" class="error-msg" style="display:none"></div>

    <div class="history" id="historyBlock" style="display:none">
      <div class="history-title">All dhikr history</div>
      <div class="accordion" id="historyAccordion"></div>
    </div>

    <div class="footer">Works best in Chrome or Edge &nbsp;·&nbsp; Microphone required</div>
  </div>

  <script>
    let count = 0;
    let isListening = false;
    let recognition = null;
    const isMobileDevice = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
    let countByDhikr = {};
    let sessionsByDhikr = {};
    let resultSlotMaxCounts = {};
    let mobileProcessedFinalIndices = {};
    let lastMobileFinalText = '';
    let lastMobileFinalAt = 0;
    let watchdogTimer = null;

    const countNum = document.getElementById('countNum');
    const ring = document.getElementById('ring');
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('statusText');
    const startBtn = document.getElementById('startBtn');
    const errorMsg = document.getElementById('errorMsg');
    const historyBlock = document.getElementById('historyBlock');
    const historyAccordion = document.getElementById('historyAccordion');
    const dhikrSelect = document.getElementById('dhikrSelect');
    const arabicText = document.getElementById('arabicText');

    const dhikrMap = {
      astaghfirullah: {
        arabic: 'أَسْتَغْفِرُ اللَّهَ',
        regex: /(استغفر\s*الله|أستغفر\s*الله|استغفرالله|أستغفرالله|استغفر|أستغفر|فاستغفر|يستغفر)/g
      },
      subhanallah: {
        arabic: 'سُبْحَانَ اللَّهِ',
        regex: /(سبحان\s*الله|سبحانالله|سبحان)/g
      },
      alhamdulillah: {
        arabic: 'الْحَمْدُ لِلَّهِ',
        regex: /(الحمد\s*لله|الحمدلله|الحمد)/g
      },
      allahuakbar: {
        arabic: 'اللَّهُ أَكْبَرُ',
        regex: /(الله\s*أكبر|الله\s*اكبر|اللهأكبر|اللهاكبر)/g
      },
      lailahaillallah: {
        arabic: 'لَا إِلَٰهَ إِلَّا اللَّهُ',
        regex: /(لا\s*إله\s*إلا\s*الله|لا\s*اله\s*الا\s*الله|لاإلهإلاالله|لاالهالاالله)/g
      }
    };

    function currentDhikr() {
      return dhikrMap[dhikrSelect.value] || dhikrMap.astaghfirullah;
    }

    function currentDhikrKey() {
      return dhikrSelect.value;
    }

    function ensureDhikrState() {
      for (const key of Object.keys(dhikrMap)) {
        if (typeof countByDhikr[key] !== 'number') countByDhikr[key] = 0;
        if (!Array.isArray(sessionsByDhikr[key])) sessionsByDhikr[key] = [];
      }
    }

    function dhikrLabelByKey(key) {
      const option = [...dhikrSelect.options].find(o => o.value === key);
      return option ? option.text : key;
    }

    function totalForDhikr(key) {
      const live = countByDhikr[key] || 0;
      const sessions = sessionsByDhikr[key] || [];
      const archived = sessions.reduce((sum, s) => sum + s.count, 0);
      return live + archived;
    }

    function syncCurrentDhikrStateToUi() {
      const key = currentDhikrKey();
      count = countByDhikr[key] || 0;
      countNum.textContent = count;
      renderHistoryAccordion();
    }

    ensureDhikrState();

    ring.addEventListener('click', manualCount);
    ring.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        manualCount();
      }
    });

    dhikrSelect.addEventListener('change', () => {
      arabicText.textContent = currentDhikr().arabic;
      resultSlotMaxCounts = {};
      mobileProcessedFinalIndices = {};
      lastMobileFinalText = '';
      lastMobileFinalAt = 0;
      syncCurrentDhikrStateToUi();
      statusText.textContent = isListening ? 'Listening…' : 'Press "Start" to begin';
    });

    function countDhikrInTranscript(transcript) {
      if (!transcript) return 0;
      const t = transcript.toLowerCase().replace(/\s+/g, ' ').trim();
      const matches = t.match(currentDhikr().regex);
      return matches ? matches.length : 0;
    }

    function updateCount(n) {
      count = n;
      countByDhikr[currentDhikrKey()] = n;
      countNum.textContent = n;
      ring.classList.add('pulse');
      setTimeout(() => ring.classList.remove('pulse'), 500);
      renderHistoryAccordion();
    }

    function manualCount() {
      updateCount(count + 1);
      dot.className = 'dot detected';
      statusText.textContent = '+1 counted (manual)';
      setTimeout(() => {
        if (isListening) {
          dot.className = 'dot active';
          statusText.textContent = 'Listening…';
        } else {
          dot.className = 'dot';
          statusText.textContent = 'Press "Start" to begin';
        }
      }, 300);
    }

    function resetCount() {
      const key = currentDhikrKey();
      const currentSessions = sessionsByDhikr[key] || [];
      if (count > 0) {
        const now = new Date();
        currentSessions.unshift({
          count,
          time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        });
        if (currentSessions.length > 5) currentSessions.pop();
        sessionsByDhikr[key] = currentSessions;
      }
      updateCount(0);
      renderHistoryAccordion();
    }

    function renderHistoryAccordion() {
      const performedKeys = Object.keys(dhikrMap).filter(key => {
        const live = countByDhikr[key] || 0;
        const sessions = sessionsByDhikr[key] || [];
        return live > 0 || sessions.length > 0;
      });

      if (performedKeys.length === 0) {
        historyBlock.style.display = 'none';
        historyAccordion.innerHTML = '';
        return;
      }

      historyBlock.style.display = 'block';
      historyAccordion.innerHTML = performedKeys.map((key) => {
        const live = countByDhikr[key] || 0;
        const sessions = sessionsByDhikr[key] || [];
        const total = totalForDhikr(key);
        const liveItem = live > 0
          ? `<div class="session-item"><span>Current</span><span class="session-count">${live}×</span></div>`
          : '';
        const sessionItems = sessions.map(s =>
          `<div class="session-item"><span>${s.time}</span><span class="session-count">${s.count}×</span></div>`
        ).join('');
        const openAttr = key === currentDhikrKey() ? ' open' : '';
        return `<details class="accordion-item"${openAttr}>
          <summary class="accordion-summary">
            <span class="accordion-title">${dhikrLabelByKey(key)}</span>
            <span class="accordion-total">${total}×</span>
          </summary>
          <div class="accordion-content">
            ${liveItem}${sessionItems}
          </div>
        </details>`;
      }).join('');
    }

    function toggleListen() {
      isListening ? stopListening() : startListening();
    }

    function createRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      const r = new SR();
      r.lang = 'ar-SA';
      // Restoring to continuous = true, which PC Chrome heavily preferred for fluidity
      r.continuous = true; 
      r.interimResults = !isMobileDevice;
      r.maxAlternatives = 1;

      // Watchdog aggressively forces a clear/restart to prevent freezing.
      function resetWatchdog() {
        clearTimeout(watchdogTimer);
        watchdogTimer = setTimeout(() => {
          if (isListening && r) {
            try { r.stop(); } catch(e) {}
          }
        }, 5000);
      }

      r.onstart = () => {
        resultSlotMaxCounts = {};
        mobileProcessedFinalIndices = {};
        lastMobileFinalText = '';
        lastMobileFinalAt = 0;
        resetWatchdog();
        dot.className = 'dot active';
        statusText.textContent = 'Listening…';
        ring.classList.add('listening');
        startBtn.textContent = 'Stop listening';
      };

      r.onresult = (e) => {
        resetWatchdog();

        if (isMobileDevice) {
          for (let i = e.resultIndex; i < e.results.length; i++) {
            const result = e.results[i];
            if (!result.isFinal) continue;
            if (mobileProcessedFinalIndices[i]) continue;

            const transcript = result[0].transcript;
            const occurrences = countDhikrInTranscript(transcript);
            mobileProcessedFinalIndices[i] = true;
            if (occurrences <= 0) continue;

            const normalized = transcript.toLowerCase().replace(/\s+/g, ' ').trim();
            const now = Date.now();
            const isDuplicateEcho = normalized === lastMobileFinalText && (now - lastMobileFinalAt) < 450;
            if (isDuplicateEcho) continue;

            // Count all detected occurrences in this finalized phrase.
            updateCount(count + occurrences);
            lastMobileFinalText = normalized;
            lastMobileFinalAt = now;

            dot.className = 'dot detected';
            statusText.textContent = '+' + occurrences + ' counted';
            setTimeout(() => {
              if (isListening) { dot.className = 'dot active'; statusText.textContent = 'Listening…'; }
            }, 350);
          }
          return;
        }

        for (let i = e.resultIndex; i < e.results.length; i++) {
          const result = e.results[i];
          const transcript = result[0].transcript;
          const occurrences = countDhikrInTranscript(transcript);
          const previousMax = resultSlotMaxCounts[i] || 0;

          // Count only positive deltas per recognition slot.
          // This captures fast repeats in interim updates without double-counting old text.
          if (occurrences > previousMax) {
            const delta = occurrences - previousMax;
            updateCount(count + delta);
            resultSlotMaxCounts[i] = occurrences;
            dot.className = 'dot detected';
            statusText.textContent = '+' + delta + ' counted';
            setTimeout(() => {
              if (isListening) { dot.className = 'dot active'; statusText.textContent = 'Listening…'; }
            }, 350);
          }

          // Keep slot maxima even after finalization so repeated callbacks cannot recount it.
          if (result.isFinal && !(i in resultSlotMaxCounts)) {
            resultSlotMaxCounts[i] = occurrences;
          }
        }
      };

      r.onerror = (e) => {
        if (e.error !== 'no-speech') {
          console.warn('Speech error:', e.error);
        }
        if (e.error === 'not-allowed') {
          errorMsg.textContent = 'Microphone access denied. Please allow microphone in browser settings.';
          errorMsg.style.display = 'block';
          stopListening();
        }
      };

      r.onend = () => {
        // Restart seamlessly whenever the browser closes the recognition stream.
        if (isListening) {
          try { r.start(); } catch(err) {
            setTimeout(() => { if(isListening) try { r.start(); } catch(e){} }, 200);
          }
        }
      };

      return r;
    }

    function startListening() {
      if (isListening) return;

      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        errorMsg.textContent = 'Speech recognition is not supported in your browser. Please use Chrome or Edge.';
        errorMsg.style.display = 'block';
        return;
      }

      errorMsg.style.display = 'none';
      isListening = true;
      startBtn.textContent = 'Starting up...';
      startBtn.classList.add('on');

      if (recognition) {
        try { recognition.stop(); } catch(e) {}
      }

      recognition = createRecognition();
      recognition.start();
    }

    function stopListening() {
      isListening = false;
      clearTimeout(watchdogTimer);
      if (recognition) { recognition.onend = null; recognition.stop(); recognition = null; }
      dot.className = 'dot';
      statusText.textContent = 'Stopped. Press "Start" to resume.';
      ring.classList.remove('listening');
      startBtn.textContent = 'Start listening';
      startBtn.classList.remove('on');
    }

    syncCurrentDhikrStateToUi();
  </script>
</body>
</html>
